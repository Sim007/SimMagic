services:
  simmagic-dev:
    build:
      context: .
      target: dev
    container_name: simmagic-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- -H 0.0.0.0 -p 3000

  simmagic-prod:
    build:
      context: .
      target: runner
    container_name: simmagic-prod
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
    command: npm run start -- -H 0.0.0.0 -p 3000
